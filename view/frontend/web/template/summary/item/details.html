<!--
/**
 * Panth CheckoutExtended - Summary Item Details Template Override
 *
 * Layout: [thumbnail (before_details)] [.panth-item-info column].
 * The info column stacks: name (wraps, never truncates) -> sku -> options,
 * then a meta row holding the qty stepper and the per-unit price. The price
 * is the UNIT price (stable across qty changes), not the row total — the qty
 * drives the cart subtotal / order total in the summary footer instead.
 * Uses text bindings for option values (never html) to prevent rendered
 * image cards; file-upload options collapse to a "file attached" chip.
 */
-->
<!-- ko foreach: getRegion('before_details') -->
    <!-- ko template: getTemplate() --><!-- /ko -->
<!-- /ko -->

<div class="panth-item-details">
    <div class="panth-item-info">
        <!-- Product name: linked when a product URL is available, plain strong otherwise. Wraps to max 2 lines, never truncated to the SKU. -->
        <!-- ko if: getProductUrl($parent) -->
        <a class="panth-item-name" data-bind="attr: {href: getProductUrl($parent)}, html: getNameUnsanitizedHtml($parent)"></a>
        <!-- /ko -->
        <!-- ko ifnot: getProductUrl($parent) -->
        <strong class="panth-item-name" data-bind="html: getNameUnsanitizedHtml($parent)"></strong>
        <!-- /ko -->

        <!-- SKU — small muted, below the name -->
        <!-- ko if: getItemSku($parent) -->
        <span class="panth-item-sku" data-bind="text: getItemSku($parent)"></span>
        <!-- /ko -->

        <!-- Options — covers configurable / bundle / downloadable / custom options.
             Short lists (1-3) are expanded by default; longer lists collapse behind a toggle. -->
        <!-- ko if: (JSON.parse($parent.options).length > 0) -->
        <div class="panth-item-options-wrap" data-bind="css: { 'panth-opts-open': JSON.parse($parent.options).length <= 3 }">
            <!-- ko if: (JSON.parse($parent.options).length > 3) -->
            <button type="button" class="panth-options-toggle"
                    data-bind="click: function(d, e){ e.target.closest('.panth-item-options-wrap').classList.toggle('panth-opts-open') }">
                View Details
                <span class="panth-toggle-arrow"></span>
            </button>
            <!-- /ko -->
            <div class="panth-options-list">
                <!-- ko foreach: JSON.parse($parent.options) -->

                <!-- Attachment: full_view has img or href - show "1 file attached" indicator -->
                <!-- ko if: ($data.full_view && ($data.full_view.toLowerCase().indexOf('<img') >= 0 || $data.full_view.toLowerCase().indexOf('href=') >= 0 || $data.full_view.toLowerCase().indexOf('<a ') >= 0 || $data.full_view.toLowerCase().indexOf('<a>') >= 0)) -->
                <div class="panth-option-row">
                    <span class="panth-opt-label" data-bind="text: label"></span><span class="panth-opt-sep">:</span>
                    <span class="panth-opt-value panth-opt-file">
                        <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 16 16" fill="#64748b"><path d="M4.5 3a2.5 2.5 0 0 1 5 0v9a1.5 1.5 0 0 1-3 0V5a.5.5 0 0 1 1 0v7a.5.5 0 0 0 1 0V3a1.5 1.5 0 1 0-3 0v9a2.5 2.5 0 0 0 5 0V5a.5.5 0 0 1 1 0v7a3.5 3.5 0 1 1-7 0V3z"/></svg>
                        1 file attached
                    </span>
                </div>
                <!-- /ko -->

                <!-- Attachment: value has img/href, no full_view -->
                <!-- ko if: ($data.value && !$data.full_view && ($data.value.toLowerCase().indexOf('<img') >= 0 || $data.value.toLowerCase().indexOf('href=') >= 0 || $data.value.toLowerCase().indexOf('<a ') >= 0)) -->
                <div class="panth-option-row">
                    <span class="panth-opt-label" data-bind="text: label"></span><span class="panth-opt-sep">:</span>
                    <span class="panth-opt-value panth-opt-file">
                        <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 16 16" fill="#64748b"><path d="M4.5 3a2.5 2.5 0 0 1 5 0v9a1.5 1.5 0 0 1-3 0V5a.5.5 0 0 1 1 0v7a.5.5 0 0 0 1 0V3a1.5 1.5 0 1 0-3 0v9a2.5 2.5 0 0 0 5 0V5a.5.5 0 0 1 1 0v7a3.5 3.5 0 1 1-7 0V3z"/></svg>
                        1 file attached
                    </span>
                </div>
                <!-- /ko -->

                <!-- Regular option with full_view - always text binding, never html (prevents image card rendering) -->
                <!-- ko if: ($data.full_view && $data.full_view.toLowerCase().indexOf('<img') < 0 && $data.full_view.toLowerCase().indexOf('href=') < 0 && $data.full_view.toLowerCase().indexOf('<a ') < 0 && $data.full_view.toLowerCase().indexOf('<a>') < 0) -->
                <div class="panth-option-row">
                    <span class="panth-opt-label" data-bind="text: label"></span><span class="panth-opt-sep">:</span>
                    <span class="panth-opt-value" data-bind="text: $data.full_view.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim()"></span>
                </div>
                <!-- /ko -->

                <!-- Regular option with value only (no full_view) -->
                <!-- ko if: (!$data.full_view && $data.value && $data.value.toLowerCase().indexOf('<img') < 0 && $data.value.toLowerCase().indexOf('href=') < 0 && $data.value.toLowerCase().indexOf('<a ') < 0) -->
                <div class="panth-option-row">
                    <span class="panth-opt-label" data-bind="text: label"></span><span class="panth-opt-sep">:</span>
                    <!-- Strip any inline markup (e.g. bundle price <span>) so it never shows as literal text -->
                    <span class="panth-opt-value" data-bind="text: $data.value.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim()"></span>
                </div>
                <!-- /ko -->

                <!-- /ko -->
            </div>
        </div>
        <!-- /ko -->

        <!-- Meta row: qty control (left) + per-unit price (right) -->
        <div class="panth-item-meta">
            <!-- Qty: stepper when editable, static value otherwise -->
            <!-- ko if: canChangeQty($parent) -->
            <span class="panth-item-qty-stepper">
                <button type="button" class="panth-qty-btn panth-qty-dec"
                        aria-label="Decrease quantity"
                        data-bind="click: function () { decQty($parent); }">&minus;</button>
                <span class="panth-item-qty" data-bind="text: $parent.qty"></span>
                <button type="button" class="panth-qty-btn panth-qty-inc"
                        aria-label="Increase quantity"
                        data-bind="click: function () { incQty($parent); }">&plus;</button>
            </span>
            <!-- /ko -->
            <!-- ko ifnot: canChangeQty($parent) -->
            <span class="panth-item-qty" data-bind="text: $parent.qty"></span>
            <!-- /ko -->

            <!-- Price: per-UNIT price, stable regardless of qty. The qty drives
                 the cart subtotal / order total shown in the summary footer.
                 Deliberately NOT the row total (qty x unit), which previously
                 made it look like changing qty changed the product price. -->
            <span class="panth-item-price">
                <span class="panth-item-unit-price" data-bind="text: getUnitPrice($parent)"></span>
                <span class="panth-item-price-each">each</span>
            </span>
        </div>
    </div>
</div>

<!-- ko foreach: getRegion('item_message') -->
    <!-- ko template: getTemplate() --><!-- /ko -->
<!-- /ko -->
